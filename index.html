<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petoi Bittle Koding</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Blockly via CDN — 鎖 v10 避免 v11 breaking change -->
  <script src="https://unpkg.com/blockly@10/blockly.min.js"></script>
  <!-- ⭐ JavaScript generator 必載（少了這行 workspaceToCode 會回傳空字串）-->
  <script src="https://unpkg.com/blockly@10/javascript_compressed.js"></script>
  <script src="https://unpkg.com/blockly@10/msg/zh-hant.js"></script>

  <!-- Three.js v0.160 via importmap（v0.4 3D 模擬器用）-->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">🐕‍🦺</span>
      <span class="title">DogLab Coding</span>
      <span class="version">v0.5.0</span>
    </div>
    <div class="actions">
      <button id="btn-mode" class="btn-secondary">模式：🖥️ 模擬</button>
      <button id="btn-connect" class="btn-secondary">🔌 連接 Bittle</button>
      <button id="btn-stop" class="btn-secondary">⏹ 停止</button>
      <button id="btn-run" class="btn-primary">▶ 執行</button>
    </div>
  </header>

  <main>
    <!-- 中：Blockly workspace -->
    <section id="blocklyDiv" class="workspace"></section>

    <!-- 右：模擬器 + Log -->
    <aside class="right-panel">
      <div class="panel-section">
        <div class="panel-header">
          <h3>模擬器</h3>
          <button id="btn-sim-mode" class="btn-mini" title="切換 2D / 3D 模擬模式">🎬 切到 3D</button>
        </div>
        <!-- 2D SVG 模擬器（預設顯示）-->
        <div id="simulator-area">
          <!-- Bittle SVG inline (避免 file:// 的 fetch CORS 問題) -->
          <svg id="bittle-svg" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
            <!-- 背景地面 -->
            <line x1="20" y1="240" x2="380" y2="240" stroke="#444" stroke-width="2" stroke-dasharray="4,4" />

            <!-- 身體 -->
            <rect id="body" x="100" y="110" width="200" height="60" rx="12" fill="#2a3f5f" stroke="#5fa9e8" stroke-width="2" />

            <!-- 頭部（外層 group 定位、內層 head 可旋轉，旋轉中心 (0,0) 在頭部圓心） -->
            <g transform="translate(310, 130)">
              <g id="head">
                <circle cx="0" cy="0" r="30" fill="#2a3f5f" stroke="#5fa9e8" stroke-width="2" />
                <circle cx="-8" cy="-5" r="6" fill="#5fa9e8" />
                <circle cx="8" cy="-5" r="6" fill="#5fa9e8" />
                <line x1="-12" y1="8" x2="12" y2="8" stroke="#5fa9e8" stroke-width="2" />
              </g>
            </g>

            <!-- 4 條腿（外層 group 定位、內層 leg-XX 可旋轉，旋轉中心 (0,0) 自然在腿頂） -->
            <g transform="translate(125, 170)">
              <g id="leg-LF">
                <rect x="-7" y="0" width="14" height="55" fill="#3a3a3a" rx="3" />
                <circle cx="0" cy="0" r="6" fill="#5fa9e8" />
              </g>
            </g>
            <g transform="translate(165, 170)">
              <g id="leg-RF">
                <rect x="-7" y="0" width="14" height="55" fill="#3a3a3a" rx="3" />
                <circle cx="0" cy="0" r="6" fill="#5fa9e8" />
              </g>
            </g>
            <g transform="translate(235, 170)">
              <g id="leg-LB">
                <rect x="-7" y="0" width="14" height="55" fill="#3a3a3a" rx="3" />
                <circle cx="0" cy="0" r="6" fill="#5fa9e8" />
              </g>
            </g>
            <g transform="translate(275, 170)">
              <g id="leg-RB">
                <rect x="-7" y="0" width="14" height="55" fill="#3a3a3a" rx="3" />
                <circle cx="0" cy="0" r="6" fill="#5fa9e8" />
              </g>
            </g>

            <!-- 機型標示 -->
            <text x="200" y="265" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">Bittle (NyBoard V1)</text>
          </svg>
        </div>
        <!-- 3D Three.js 模擬器（預設隱藏，按鈕切換）-->
        <div id="simulator-3d-area" style="display: none;"></div>
        <div id="status-line">狀態：等待指令</div>
        <!-- v0.5.0 事件觸發列（模擬模式手動觸發感測事件）-->
        <div class="event-trigger-bar">
          <span class="event-label">⚡ 模擬事件：</span>
          <button class="btn-event" data-event="lifted" title="模擬：被舉起">🤚 被舉起</button>
          <button class="btn-event" data-event="dropped" title="模擬：跌落">💥 跌落</button>
          <button class="btn-event" data-event="touch_head" title="模擬：頭被觸碰">👆 觸頭</button>
          <button class="btn-event" data-event="distance_lt" data-data="10" title="模擬：前方 10 cm 內有東西">📏 近距</button>
          <button class="btn-event" data-event="voltage_lt" data-data="6.5" title="模擬：電量低 6.5V">🔋 低電</button>
        </div>
      </div>

      <div class="panel-section">
        <h3>執行記錄</h3>
        <div id="log"></div>
      </div>
    </aside>
  </main>

  <!-- 自訂 JS（依序載入：先 metadata，再設定，再積木，再生成器，再模組，最後整合）-->
  <!-- v0.2：bittle-skills-data.js 必須在 blocks/generators 之前載入（提供 BITTLE_SKILLS array）-->
  <script src="js/bittle-skills-data.js"></script>
  <script src="js/blockly-config.js"></script>
  <script src="js/bittle-blocks.js"></script>
  <script src="js/bittle-generators.js"></script>
  <script src="js/robots/IRobot.js"></script>
  <script src="js/simulator-svg.js"></script>
  <script src="js/serial.js"></script>
  <script src="js/main.js"></script>
  <!-- v0.4 3D 模擬器（ES module，會在所有 sync script 之後執行）-->
  <script type="module" src="js/simulator-3d.js"></script>
</body>
</html>
