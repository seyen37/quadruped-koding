<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petoi Bittle Koding</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Blockly via CDN — 鎖 v10 避免 v11 breaking change -->
  <script src="https://unpkg.com/blockly@10/blockly.min.js"></script>
  <!-- ⭐ JavaScript generator 必載（少了這行 workspaceToCode 會回傳空字串）-->
  <script src="https://unpkg.com/blockly@10/javascript_compressed.js"></script>
  <script src="https://unpkg.com/blockly@10/msg/zh-hant.js"></script>

  <!-- Three.js v0.160 via importmap（v0.4 3D 模擬器用）-->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">🐕‍🦺</span>
      <span class="title">DogLab Coding</span>
      <span class="version">v0.5.1</span>
    </div>
    <div class="actions">
      <button id="btn-mode" class="btn-secondary">模式：🖥️ 模擬</button>
      <button id="btn-connect" class="btn-secondary">🔌 連接 Bittle</button>
      <button id="btn-stop" class="btn-secondary">⏹ 停止</button>
      <button id="btn-run" class="btn-primary">▶ 執行</button>
    </div>
  </header>

  <main>
    <!-- 中：Blockly workspace -->
    <section id="blocklyDiv" class="workspace"></section>

    <!-- 右：模擬器 + Log -->
    <aside class="right-panel">
      <div class="panel-section">
        <div class="panel-header">
          <h3>3D 模擬器</h3>
          <button id="btn-sim-size" class="btn-mini" title="放大／縮小模擬器畫面">🔍 放大</button>
        </div>
        <!-- v0.5.1：移除 2D SVG 區塊，3D 為唯一模擬器（simulator-svg.js 仍保留檔案以利歷史追溯）-->
        <div id="simulator-3d-area"></div>
        <div id="status-line">狀態：等待指令</div>
        <!-- v0.5.0 事件觸發列（模擬模式手動觸發感測事件）-->
        <div class="event-trigger-bar">
          <span class="event-label">⚡ 模擬事件：</span>
          <button class="btn-event" data-event="lifted" title="模擬：被舉起">🤚 被舉起</button>
          <button class="btn-event" data-event="dropped" title="模擬：跌落">💥 跌落</button>
          <button class="btn-event" data-event="touch_head" title="模擬：頭被觸碰">👆 觸頭</button>
          <button class="btn-event" data-event="distance_lt" data-data="10" title="模擬：前方 10 cm 內有東西">📏 近距</button>
          <button class="btn-event" data-event="voltage_lt" data-data="6.5" title="模擬：電量低 6.5V">🔋 低電</button>
        </div>
      </div>

      <div class="panel-section">
        <h3>執行記錄</h3>
        <div id="log"></div>
      </div>
    </aside>
  </main>

  <!-- 自訂 JS（依序載入：先 metadata，再設定，再積木，再生成器，再模組，最後整合）-->
  <!-- v0.2：bittle-skills-data.js 必須在 blocks/generators 之前載入（提供 BITTLE_SKILLS array）-->
  <script src="js/bittle-skills-data.js"></script>
  <script src="js/blockly-config.js"></script>
  <script src="js/bittle-blocks.js"></script>
  <script src="js/bittle-generators.js"></script>
  <script src="js/robots/IRobot.js"></script>
  <!-- v0.5.1：移除 simulator-svg.js 載入（2D 已下線；檔案保留供歷史追溯）-->
  <script src="js/serial.js"></script>
  <script src="js/main.js"></script>
  <!-- v0.4 3D 模擬器（ES module，會在所有 sync script 之後執行）-->
  <script type="module" src="js/simulator-3d.js"></script>
</body>
</html>
